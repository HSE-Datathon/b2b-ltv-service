<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>LTV & NBO demo</title>
    <link rel="stylesheet" href="static/style.css" />
</head>
<body>
    <h1>LTV & NBO demo</h1>
    <p class="subtitle">Мини‑панель для ручной проверки API.</p>

    <nav class="tabs" role="tablist">
        <button type="button" class="tab active" data-tab="ltv" role="tab">LTV</button>
        <button type="button" class="tab" data-tab="nbo" role="tab">NBO</button>
        <button type="button" class="tab" data-tab="dashboard" role="tab">Дашборд</button>
        <button type="button" class="tab" data-tab="output" role="tab">Результат</button>
    </nav>

    <div id="panel-ltv" class="tab-panel active" role="tabpanel">
        <div class="card">
            <h2>Прогноз LTV</h2>
            <label>Компания <span id="ltv_company_count" class="hint"></span></label>
            <div class="company-picker">
                <input id="ltv_search" placeholder="Поиск по company_id или сегменту…" autocomplete="off" />
                <select id="ltv_company_id" size="5"></select>
            </div>
            <div class="row">
                <div>
                    <label>company_size</label>
                    <input id="ltv_company_size" type="number" placeholder="100" />
                </div>
                <div>
                    <label>revenue</label>
                    <input id="ltv_revenue" type="number" placeholder="123456" />
                </div>
            </div>
            <button type="button" id="ltv_btn">Посчитать LTV</button>
        </div>
    </div>

    <div id="panel-nbo" class="tab-panel" role="tabpanel">
        <div class="card">
            <h2>Рекомендации продуктов (NBO)</h2>
            <label>Компания <span id="nbo_company_count" class="hint"></span></label>
            <div class="company-picker">
                <input id="nbo_search" placeholder="Поиск по company_id или сегменту…" autocomplete="off" />
                <select id="nbo_company_id" size="5"></select>
            </div>
            <div class="row">
                <div>
                    <label>top_k</label>
                    <input id="nbo_top_k" type="number" value="5" min="1" max="20" />
                </div>
            </div>
            <button type="button" id="nbo_btn">Получить рекомендации</button>
        </div>
    </div>

    <div id="panel-dashboard" class="tab-panel" role="tabpanel">
        <div class="card">
            <h2>Сводный дашборд</h2>
            <p>Статистика LTV по сегментам клиентов на основе обученной модели.</p>
            <button type="button" id="dash_btn">Обновить дашборд</button>
            <div id="dash_container" class="dash-container"></div>
        </div>
    </div>

    <div id="panel-output" class="tab-panel" role="tabpanel">
        <h2>Результат</h2>
        <pre id="output">Здесь появится ответ сервера…</pre>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
